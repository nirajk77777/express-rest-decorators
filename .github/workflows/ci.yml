name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Node ${{ matrix.node }} / pool=${{ matrix.pool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        pool: [forks, threads]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Run tests (pool=${{ matrix.pool }})
        run: pnpm test:${{ matrix.pool }}

      - name: Build (tshy dual ESM+CJS)
        run: pnpm build

      - name: Build smoke test
        run: pnpm test:build

      - name: Type resolution gate (attw)
        run: pnpm exec attw --pack . --profile node16

      - name: Package config gate publint
        run: pnpm exec publint
